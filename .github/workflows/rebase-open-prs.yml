# Rebase all open PRs when master is updated
# This keeps PRs up-to-date automatically
name: Rebase Open PRs

on:
  push:
    branches:
      - master

permissions:
  contents: write
  pull-requests: write

jobs:
  rebase-open-prs:
    runs-on: ubuntu-latest
    steps:
      - uses: mPokornyETM/rebase-open-prs-action@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
