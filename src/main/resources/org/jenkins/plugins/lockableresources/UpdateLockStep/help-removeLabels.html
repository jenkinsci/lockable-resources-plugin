<div>
  <p>
    Removes the specified labels from the resource.
    Multiple labels should be separated by whitespace.
    Labels that do not exist on the resource will be ignored.
  </p>
  <p>
    Cannot be used together with <code>setLabels</code>.
  </p>
  <p>
    Example: <code>removeLabels: 'oldlabel1 oldlabel2'</code>
  </p>
</div>
