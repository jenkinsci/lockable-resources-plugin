<div>
  <p>
    Sets the labels of the resource, replacing any existing labels.
    Multiple labels should be separated by whitespace.
  </p>
  <p>
    Cannot be used together with <code>addLabels</code> or <code>removeLabels</code>.
  </p>
  <p>
    Example: <code>setLabels: 'label1 label2 label3'</code>
  </p>
</div>
