<div>
  <p>
    Adds labels to the resource without removing existing labels.
    Multiple labels should be separated by whitespace.
    Labels that already exist on the resource will not be duplicated.
  </p>
  <p>
    Cannot be used together with <code>setLabels</code>.
  </p>
  <p>
    Example: <code>addLabels: 'newlabel1 newlabel2'</code>
  </p>
</div>
